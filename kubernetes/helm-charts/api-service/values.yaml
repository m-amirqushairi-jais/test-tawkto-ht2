replicaCount: 2

image:
  repository: api-service
  tag: sandbox
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

# MongoDB connection settings.
# Credentials must be injected via Kubernetes Secret, not stored in values.
mongo:
  db: api_service
  uri: "mongodb://mongodb-0.mongodb.data.svc.cluster.local:27017/api_service?replicaSet=rs0"
  password: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# improvement 2 - restricts container OS-level permissions; runAsNonRoot prevents root exploits, readOnlyRootFilesystem blocks file tampering, allowPrivilegeEscalation:false prevents sudo-style escalation
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

# Pod disruption budget — requires replicaCount >= 2 to be effective.
pdb:
  enabled: true
  minAvailable: 1

nodeSelector: {}
